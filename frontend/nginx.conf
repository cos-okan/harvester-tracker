server {
    listen 80;
    server_name localhost;

    # Frontend (React) Statik Dosyaları
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Backend (Python) Yönlendirmesi (Proxy)
    location /api/ {
        # ÇOK KRİTİK: Buradaki URL'i kendi Render backend URL'nizle değiştirin!
        # Sonundaki eğik çizgiye (/) dikkat edin.
        proxy_pass https://harvester-tracker.onrender.com/; 
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}